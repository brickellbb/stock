<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background: transparent;
  }

  /* 🔧 Adjust ONLY this scale value */
  .scale-wrapper {
    transform: scale(0.8);              /* 👈 change this */
    transform-origin: top left;
    width: 140%;
    height: 125%;
  }

  iframe {
    border: 0;
    width: 100%;
    height: 100%;
  }
</style>
</head>

<body>

<script>
  document.documentElement.style.overflow = 'hidden';

  const stockUrl = "https://api.stockdio.com/visualization/financial/charts/v1/Ticker?app-key=A6DD9D7C391D403FB9D51319F15FD811&stockExchange=TSX&symbols=CSU;IFC;DOL;HXQ;VDY&scroll=No&palette=Brown-Sugar&layoutType=13&backgroundColor=00000000";

  function isWeekday() {
    const dayOfWeek = new Date().getDay();
    return dayOfWeek >= 1 && dayOfWeek <= 5;
  }

  function isTimeInRange() {
    const now = new Date();
    const currentHour = now.getHours();
    const currentMinute = now.getMinutes();

    const startHour = 8;
    const endHour = 17;

    return (
      isWeekday() &&
      currentHour >= startHour &&
      currentHour <= endHour &&
      (currentHour !== endHour || currentMinute === 0)
    );
  }

function updateIframe() {
  const iframe = document.getElementById("st_e0f6ace58ff24491ba476ea006343c9b");
  if (!iframe) return;

  const currentSrc = iframe.getAttribute("src");

  // If blank, load it once — even on weekends/outside hours
  if (!currentSrc) {
    iframe.setAttribute("src", stockUrl);
    iframe.style.visibility = "visible";
    return;
  }

  // If already loaded, leave it alone outside market hours
  if (!isTimeInRange()) {
    iframe.style.visibility = "visible";
    return;
  }

  // During market hours, keep it visible
  iframe.style.visibility = "visible";
}

  function scheduleReload() {
    setInterval(function () {
      if (isTimeInRange()) {
        location.reload();
      }
    }, 30 * 60 * 1000);
  }

  // Initial load
  updateIframe();

  // Periodic reloads (only during active time)
  scheduleReload();
</script>

<div class="scale-wrapper">
<iframe
  id="st_e0f6ace58ff24491ba476ea006343c9b"
  scrolling="no">
</iframe>
</div>

</body>
